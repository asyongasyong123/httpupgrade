worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 3600;
    keepalive_requests 100000;
    client_max_body_size 100M;

    server {
        listen 8080;
        server_name _;

        location = / {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ======================================
        # HTTP UPGRADE + TLS ROUTES
        # ======================================
        location ^~ /freenet {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Route by protocol
            if ($http_user_agent ~* "trojan") {
                proxy_pass http://127.0.0.1:11001; # Trojan + HU + TLS
            }
            if ($http_user_agent ~* "vless") {
                proxy_pass http://127.0.0.1:11002; # VLESS + HU + TLS
            }
            if ($http_user_agent ~* "vmess") {
                proxy_pass http://127.0.0.1:11003; # VMess + HU + TLS
            }
            if ($http_user_agent ~* "shadowsocks|ss") {
                proxy_pass http://127.0.0.1:11004; # SS + HU + TLS
            }

            # Fallback
            proxy_pass http://127.0.0.1:11001;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }
    }
}
