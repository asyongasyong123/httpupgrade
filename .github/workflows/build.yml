name: Build & Push
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER3 }}
          password: ${{ secrets.DOCKER_TOKEN3 }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jthandg/httpupgrade:latest
          no-cache: true
