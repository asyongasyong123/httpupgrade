name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - config.json
      - envoy.yaml
  workflow_dispatch:

env:
  DOCKER_USER: DOCKER_USER3
  DOCKER_REPO: httpupgrade
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}

      - name: Done
        run: echo "✅ Pushed: ${{ env.DOCKER_USER }}/${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}"
